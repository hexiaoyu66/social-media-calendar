<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>社交媒体内容日历生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poiret+One&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #def0f9;
        --text: #142033;
        --muted: #66758c;
        --line: #e4ebf3;
        --title: #4167b1;
        --btn: #ff8a00;
        --btn-deep: #f97316;
        --sky: #38bdf8;
        --low: #22c55e;
        --mid: #f59e0b;
        --high-a: #8b5cf6;
        --high-b: #c026d3;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .page {
        width: min(90vw, 1440px);
        margin: 0 auto;
        padding: 34px 0 64px;
      }

      .hero {
        text-align: center;
        margin-bottom: 18px;
      }

      .hero h1 {
        margin: 0;
        font-family: "Poiret One", sans-serif;
        font-size: clamp(2rem, 4vw, 3.8rem);
        font-weight: 300;
        line-height: 1.06;
        letter-spacing: 0.02em;
        color: var(--title);
      }

      .hero p {
        margin: 10px auto 0;
        max-width: 760px;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.8;
      }

      .glass {
        background: rgba(255, 255, 255, 0.68);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.78);
        box-shadow: 0 18px 45px rgba(65, 103, 177, 0.08);
      }

      .top-panel {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 22px;
        border-radius: 30px;
        padding: 24px;
        margin-bottom: 26px;
      }

      .left-panel {
        display: grid;
        gap: 18px;
        align-content: start;
      }

      .field {
        display: grid;
        gap: 10px;
      }

      .label {
        font-size: 0.92rem;
        font-weight: 600;
        color: #334155;
      }

      .prompt {
        width: 100%;
        min-height: 136px;
        resize: vertical;
        border: 1px solid #d7e8f7;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.96);
        padding: 18px;
        color: var(--text);
        outline: none;
        box-shadow: 0 10px 26px rgba(65, 103, 177, 0.06);
        transition: border-color 180ms ease, box-shadow 180ms ease;
      }

      .prompt:focus {
        border-color: #9fc3eb;
        box-shadow: 0 0 0 5px rgba(65, 103, 177, 0.1);
      }

      .period-wrap {
        display: inline-grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        width: 100%;
        max-width: 320px;
      }

      .period-btn {
        border: 1px solid #d7e8f7;
        background: rgba(255, 255, 255, 0.95);
        color: #334155;
        border-radius: 999px;
        padding: 13px 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 180ms ease;
      }

      .period-btn.active {
        background: linear-gradient(135deg, #eff6ff 0%, #f8fbff 100%);
        border-color: #9fc3eb;
        color: #4167b1;
        box-shadow: 0 8px 22px rgba(65, 103, 177, 0.1);
      }

      .generate-btn {
        width: 100%;
        border: 0;
        border-radius: 22px;
        padding: 18px 22px;
        font-size: 1rem;
        font-weight: 800;
        color: #ffffff;
        cursor: pointer;
        background: linear-gradient(135deg, var(--btn) 0%, var(--btn-deep) 100%);
        box-shadow: 0 18px 34px rgba(255, 138, 0, 0.24);
        transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      }

      .generate-btn:hover {
        transform: translateY(-1px) scale(1.015);
        box-shadow: 0 24px 40px rgba(255, 138, 0, 0.3);
        filter: brightness(1.02);
      }

      .right-panel {
        position: relative;
        overflow: hidden;
        border-radius: 28px;
        min-height: 340px;
        background:
          radial-gradient(circle at 85% 88%, rgba(255, 166, 77, 0.24), transparent 20%),
          radial-gradient(circle at 72% 90%, rgba(255, 220, 120, 0.18), transparent 16%),
          linear-gradient(180deg, #081234 0%, #0b1d4b 54%, #10204a 100%);
        border: 1px solid rgba(255, 255, 255, 0.16);
      }

      .night-stars {
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(circle at 12% 18%, rgba(255,255,255,0.8) 0 1px, transparent 1.5px),
          radial-gradient(circle at 24% 30%, rgba(255,255,255,0.65) 0 1px, transparent 1.5px),
          radial-gradient(circle at 38% 16%, rgba(255,255,255,0.55) 0 1px, transparent 1.5px),
          radial-gradient(circle at 54% 28%, rgba(255,255,255,0.8) 0 1.2px, transparent 1.8px),
          radial-gradient(circle at 70% 14%, rgba(255,255,255,0.7) 0 1px, transparent 1.5px),
          radial-gradient(circle at 80% 34%, rgba(255,255,255,0.55) 0 1px, transparent 1.5px),
          radial-gradient(circle at 90% 20%, rgba(255,255,255,0.7) 0 1px, transparent 1.5px),
          radial-gradient(circle at 16% 46%, rgba(255,255,255,0.65) 0 1px, transparent 1.5px),
          radial-gradient(circle at 45% 48%, rgba(255,255,255,0.55) 0 1px, transparent 1.5px),
          radial-gradient(circle at 62% 44%, rgba(255,255,255,0.7) 0 1px, transparent 1.5px);
        opacity: 0.9;
      }

      .shooting-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .shooting-star {
        position: absolute;
        width: 120px;
        height: 4px;
        background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,243,190,0.35), rgba(255,243,190,0.95));
        border-radius: 999px;
        transform: rotate(24deg);
        filter: drop-shadow(0 0 8px rgba(255, 242, 178, 0.9));
        opacity: 0;
        animation: fallStar 5.8s linear infinite;
      }

      .shooting-star::after {
        content: "";
        position: absolute;
        right: -4px;
        top: 50%;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        transform: translateY(-50%);
        background: radial-gradient(circle, #fffdf1 0%, #ffe28a 65%, rgba(255, 226, 138, 0) 100%);
      }

      .star-1 {
        top: 16%;
        left: 6%;
        animation-delay: 0s;
      }

      .star-2 {
        top: 6%;
        left: 24%;
        width: 92px;
        animation-delay: 2.1s;
      }

      .star-3 {
        top: 22%;
        left: -4%;
        width: 108px;
        animation-delay: 4.2s;
      }

      @keyframes fallStar {
        0% {
          opacity: 0;
          transform: translate(0, 0) rotate(24deg);
        }
        8% {
          opacity: 1;
        }
        72% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translate(180px, 96px) rotate(24deg);
        }
      }

      .hill {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 82px;
        background: linear-gradient(180deg, rgba(10, 25, 48, 0) 0%, #102038 36%, #091627 100%);
      }

      .glow {
        position: absolute;
        border-radius: 50%;
        filter: blur(18px);
        pointer-events: none;
      }

      .glow-left {
        width: 132px;
        height: 132px;
        right: 12px;
        bottom: -18px;
        background: rgba(255, 141, 46, 0.28);
      }

      .glow-mid {
        width: 92px;
        height: 92px;
        right: 106px;
        bottom: 18px;
        background: rgba(255, 224, 120, 0.2);
      }

      .character-wrap {
        position: absolute;
        right: 38px;
        bottom: 26px;
        width: min(44%, 190px);
      }

      .character-svg {
        width: 100%;
        height: auto;
        overflow: visible;
      }

      .jar-row {
        position: absolute;
        left: 18px;
        right: 96px;
        bottom: 18px;
        display: flex;
        align-items: flex-end;
        gap: 10px;
      }

      .jar {
        width: 30px;
        height: 40px;
        border-radius: 10px 10px 12px 12px;
        background: rgba(255, 226, 150, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.34);
        position: relative;
        box-shadow: 0 0 18px rgba(255, 198, 79, 0.16);
      }

      .jar::before {
        content: "";
        position: absolute;
        left: 4px;
        right: 4px;
        top: 4px;
        height: 6px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.3);
      }

      .jar::after {
        content: "";
        position: absolute;
        left: 7px;
        right: 7px;
        bottom: 8px;
        height: 18px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,244,190,0.95) 0%, rgba(255,210,90,0.82) 52%, rgba(255,184,68,0.18) 100%);
        box-shadow: 0 0 14px rgba(255, 217, 102, 0.88);
        animation: jarGlow 2.6s ease-in-out infinite;
      }

      .jar:nth-child(2)::after { animation-delay: 0.5s; }
      .jar:nth-child(3)::after { animation-delay: 0.9s; }
      .jar:nth-child(4)::after { animation-delay: 1.4s; }
      .jar:nth-child(5)::after { animation-delay: 0.2s; }
      .jar:nth-child(6)::after { animation-delay: 1.1s; }

      @keyframes jarGlow {
        0%, 100% { opacity: 0.85; transform: scale(0.96); }
        50% { opacity: 1; transform: scale(1.05); }
      }

      .caption {
        position: absolute;
        right: 22px;
        top: 18px;
        color: rgba(255, 255, 255, 0.88);
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: lowercase;
      }

      .calendar-shell {
        border-radius: 30px;
        padding: 24px;
      }

      .calendar-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .calendar-head h2 {
        margin: 0;
        font-size: 1.16rem;
      }

      .calendar-head p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .legend-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .filter-dot {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid transparent;
        background: rgba(255, 255, 255, 0.86);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.82rem;
        font-weight: 700;
        color: #334155;
        cursor: pointer;
        transition: all 160ms ease;
      }

      .filter-dot:hover {
        transform: translateY(-1px);
      }

      .filter-dot.active {
        border-color: #bfdbfe;
        box-shadow: 0 8px 18px rgba(59, 130, 246, 0.12);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex: 0 0 auto;
      }

      .dot-low {
        background: var(--low);
      }

      .dot-mid {
        background: var(--mid);
      }

      .dot-high {
        background: linear-gradient(135deg, var(--high-a) 0%, var(--high-b) 100%);
      }

      .calendar-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(1, minmax(0, 1fr));
      }

      .day-card {
        background: #ffffff;
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 20px;
        box-shadow: 0 10px 26px rgba(15, 23, 42, 0.04);
        transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease, border-color 180ms ease;
      }

      .day-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 32px rgba(15, 23, 42, 0.08);
      }

      .day-card.dimmed {
        opacity: 0.2;
      }

      .day-card.highlight {
        opacity: 1;
        border-color: #c7d2fe;
        box-shadow: 0 18px 40px rgba(79, 70, 229, 0.12);
      }

      .day-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .day-number {
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #94a3b8;
      }

      .day-date {
        margin-top: 6px;
        font-size: 1.05rem;
        font-weight: 700;
        color: #111827;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.78rem;
        font-weight: 800;
        white-space: nowrap;
      }

      .pill-low {
        background: #dcfce7;
        color: #15803d;
      }

      .pill-mid {
        background: #ffedd5;
        color: #c2410c;
      }

      .pill-high {
        background: linear-gradient(135deg, #8b5cf6 0%, #c026d3 100%);
        color: #ffffff;
      }

      .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .type-chip,
      .tag-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .type-chip {
        background: #f8fafc;
        color: #334155;
      }

      .tag-chip {
        background: #eff6ff;
        color: #2563eb;
      }

      .section {
        margin-top: 18px;
      }

      .section-title {
        font-size: 0.9rem;
        font-weight: 700;
        color: #111827;
      }

      .section p {
        margin: 8px 0 0;
        color: #475569;
        font-size: 0.94rem;
        line-height: 1.8;
      }

      .hotspot-box {
        margin-top: 18px;
        padding: 14px;
        border-radius: 18px;
        background: #f8fbff;
        border: 1px solid #e0ecff;
      }

      @media (min-width: 768px) {
        .calendar-grid.week {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .calendar-grid.month {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (min-width: 1200px) {
        .calendar-grid.week {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .calendar-grid.month {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }
      }

      @media (max-width: 980px) {
        .top-panel {
          grid-template-columns: 1fr;
        }

        .right-panel {
          min-height: 320px;
        }

        .character-wrap {
          width: min(42%, 170px);
          right: 26px;
        }

        .jar-row {
          right: 72px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>设计媒体内容日历生成器</h1>
        <p>输入账号定位，选择 1 周或 1 个月周期，自动生成包含主题、方向、热点和执行难度的内容日历。</p>
      </section>

      <section class="top-panel glass">
        <div class="left-panel">
          <div class="field">
            <label class="label" for="positioning">账号定位</label>
            <textarea
              id="positioning"
              class="prompt"
              placeholder="描述您的领域、受众与风格..."
            ></textarea>
          </div>

          <div class="field">
            <div class="label">计划周期</div>
            <div class="period-wrap">
              <button type="button" class="period-btn active" data-period="week">1周</button>
              <button type="button" class="period-btn" data-period="month">1个月</button>
            </div>
          </div>

          <button id="generateBtn" class="generate-btn" type="button">生成日历</button>
        </div>

        <div class="right-panel">
          <div class="night-stars"></div>
          <div class="shooting-layer">
            <span class="shooting-star star-1"></span>
            <span class="shooting-star star-2"></span>
            <span class="shooting-star star-3"></span>
          </div>
          <div class="caption">find something interesting</div>
          <div class="jar-row">
            <span class="jar"></span>
            <span class="jar"></span>
            <span class="jar"></span>
            <span class="jar"></span>
            <span class="jar"></span>
            <span class="jar"></span>
          </div>
          <div class="character-wrap">
            <svg class="character-svg" viewBox="0 0 220 230" xmlns="http://www.w3.org/2000/svg" aria-label="healing cartoon mascot">
              <g>
                <animateTransform
                  attributeName="transform"
                  type="translate"
                  values="0 0; 0 -4; 0 0"
                  dur="3.6s"
                  repeatCount="indefinite"
                />
                <path d="M123 38C162 38 189 63 189 108C189 149 161 183 125 183H92C60 183 34 157 34 122C34 89 56 63 90 63C95 49 107 38 123 38Z" fill="#ffb000" />
                <path d="M123 38C162 38 189 63 189 108C189 149 161 183 125 183H92C60 183 34 157 34 122C34 89 56 63 90 63C95 49 107 38 123 38Z" fill="none" stroke="#dc8a00" stroke-width="3" stroke-linejoin="round" />
                <circle cx="102" cy="108" r="37" fill="#ffae8a" />
                <circle cx="95" cy="108" r="7" fill="#fff" />
                <circle cx="119" cy="108" r="7" fill="#fff" />
                <circle cx="96" cy="109" r="3.1" fill="#3b2f2f">
                  <animate attributeName="ry" values="3.1;0.4;3.1" dur="4.5s" repeatCount="indefinite" />
                </circle>
                <circle cx="120" cy="109" r="3.1" fill="#3b2f2f">
                  <animate attributeName="ry" values="3.1;0.4;3.1" dur="4.5s" repeatCount="indefinite" />
                </circle>
                <circle cx="87" cy="118" r="4.5" fill="#ff7a59" opacity="0.55" />
                <circle cx="129" cy="118" r="4.5" fill="#ff7a59" opacity="0.55" />
                <path d="M107 122C110 126 115 126 118 122" stroke="#9a3d21" stroke-width="3" stroke-linecap="round" />
                <path d="M148 38L180 16L182 50" fill="#ffb000" stroke="#dc8a00" stroke-width="3" stroke-linejoin="round" />
                <path d="M181 16L198 5L194 25L210 32L192 37L191 55L180 41" fill="#ffb000" stroke="#dc8a00" stroke-width="3" stroke-linejoin="round" />
                <path d="M66 179C64 192 58 205 49 214" stroke="#dc8a00" stroke-width="4" stroke-linecap="round" />
                <path d="M110 183C112 201 108 216 101 224" stroke="#dc8a00" stroke-width="4" stroke-linecap="round" />
                <path d="M142 177C148 195 154 207 162 214" stroke="#dc8a00" stroke-width="4" stroke-linecap="round" />
                <path d="M154 196L176 186" stroke="#e8eef8" stroke-width="3" stroke-linecap="round" />
                <path d="M176 186L185 198" stroke="#e8eef8" stroke-width="3" stroke-linecap="round" />
                <rect x="171" y="182" width="18" height="22" rx="4" fill="#8bd0ff" stroke="#dff3ff" stroke-width="2" />
                <circle cx="180" cy="192" r="3" fill="#fff8c9" />
              </g>
            </svg>
          </div>
          <div class="hill"></div>
          <div class="glow glow-left"></div>
          <div class="glow glow-mid"></div>
        </div>
      </section>

      <section class="calendar-shell glass">
        <div class="calendar-head">
          <div>
            <h2>日历视图</h2>
            <p id="calendarSummary">输入账号定位后点击生成，查看完整内容日历。</p>
          </div>

          <div class="legend-bar" id="legendBar">
            <button class="filter-dot" data-filter="低">
              <span class="dot dot-low"></span>
              <span>低难度</span>
            </button>
            <button class="filter-dot" data-filter="中">
              <span class="dot dot-mid"></span>
              <span>中难度</span>
            </button>
            <button class="filter-dot" data-filter="高">
              <span class="dot dot-high"></span>
              <span>高难度</span>
            </button>
          </div>
        </div>

        <div id="calendarGrid" class="calendar-grid week"></div>
      </section>
    </main>

    <script>
      const positioningInput = document.getElementById("positioning");
      const generateBtn = document.getElementById("generateBtn");
      const periodButtons = Array.from(document.querySelectorAll(".period-btn"));
      const filterButtons = Array.from(document.querySelectorAll(".filter-dot"));
      const calendarGrid = document.getElementById("calendarGrid");
      const calendarSummary = document.getElementById("calendarSummary");
      const legendBar = document.getElementById("legendBar");

      let selectedPeriod = "week";
      let activeDifficultyFilter = null;

      const contentTypes = [
        { name: "干货", emoji: "📘" },
        { name: "互动", emoji: "💬" },
        { name: "故事", emoji: "📖" },
        { name: "热点", emoji: "⚡" }
      ];

      const weekdayNames = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];

      const hotspots = {
        week: [
          "周初规划热点：适合清单、目标拆解和行动建议。",
          "周中效率热点：适合分享方法、模板与避坑经验。",
          "评论征集热点：适合收集受众问题，为后续内容蓄水。",
          "案例复盘热点：适合展示成果、经验和具体变化。",
          "周末轻互动热点：适合投票、问答和轻量分享。"
        ],
        month: [
          "月初规划热点：适合发布目标、路线图和节奏建议。",
          "月中复盘热点：适合问题诊断和阶段成果总结。",
          "趋势观察热点：适合关联行业变化与用户新需求。",
          "节点借势热点：适合结合节日、换季或平台活动。",
          "月末总结热点：适合复盘、收获与下月预告。"
        ]
      };

      function getTotalDays(period) {
        return period === "month" ? 30 : 7;
      }

      function parsePositioning(text) {
        const raw = text.trim();
        if (!raw) {
          return {
            domain: "通用内容赛道",
            audience: "泛兴趣用户",
            style: "清晰、可信、易执行"
          };
        }

        const parts = raw
          .split(/[，。,.\n；;、]/)
          .map((item) => item.trim())
          .filter(Boolean);

        return {
          domain: parts[0] || raw,
          audience: parts[1] || "对该领域感兴趣的目标用户",
          style: parts[2] || "专业清晰、友好克制"
        };
      }

      function pickDifficulty(type, dayIndex, period) {
        if (type === "互动") return "低";
        if (type === "干货") return dayIndex % 3 === 0 ? "中" : "低";
        if (type === "故事") return "中";
        if (type === "热点") return period === "month" && dayIndex % 5 === 0 ? "高" : "中";
        return "中";
      }

      function getTopicTitle(type, domain, audience, index) {
        const topicMap = {
          干货: [
            `分享一个关于${domain}的入门方法，帮助${audience}快速开始`,
            `拆解一个${domain}常见误区，并给出更稳妥的做法`,
            `制作一份${domain}实操清单，让${audience}立刻能执行`
          ],
          互动: [
            `围绕${domain}发起选择题，了解${audience}最在意的挑战`,
            `做一条评论区征集帖，邀请${audience}说出真实困惑`,
            `设计一个二选一互动，测试${audience}偏好的内容方向`
          ],
          故事: [
            `讲一个与你的${domain}相关的真实经历，建立可信度`,
            `分享一次从混乱到有序的转变过程，强化品牌故事感`,
            `讲述一个用户在${domain}上的进步案例`
          ],
          热点: [
            `把近期常见讨论点映射到${domain}，给${audience}一个实用判断框架`,
            `借势阶段性热点话题，说明${domain}为什么值得现在行动`,
            `结合平台趋势变化，提醒${audience}哪些机会正在出现`
          ]
        };

        const choices = topicMap[type];
        return choices[index % choices.length];
      }

      function getDirection(type, style, domain, audience) {
        const directionMap = {
          干货: `用${style}的表达方式，给出明确步骤、模板或方法，避免空泛结论。`,
          互动: `语气保持${style}，设置低门槛提问，让${audience}更愿意评论、投票或分享经验。`,
          故事: `以${style}的叙事方式呈现过程、转折与结果，让${domain}内容更有人味。`,
          热点: `用${style}的视角快速解释热点与${domain}的关系，并指出对${audience}的实际价值。`
        };

        return directionMap[type];
      }

      function getHotspot(period, index) {
        const list = hotspots[period];
        return list[index % list.length];
      }

      function buildPlan(positioning, period) {
        const totalDays = getTotalDays(period);
        const baseDate = new Date();
        const profile = parsePositioning(positioning);
        const items = [];

        for (let i = 0; i < totalDays; i += 1) {
          const date = new Date(baseDate);
          date.setDate(baseDate.getDate() + i);

          const typeInfo = contentTypes[i % contentTypes.length];
          const difficulty = pickDifficulty(typeInfo.name, i, period);

          items.push({
            dayNumber: i + 1,
            label:
              period === "month"
                ? `${date.getMonth() + 1} 月 ${date.getDate()} 日`
                : `${weekdayNames[date.getDay()]} · ${date.getMonth() + 1}/${date.getDate()}`,
            type: typeInfo.name,
            emoji: typeInfo.emoji,
            difficulty,
            title: getTopicTitle(typeInfo.name, profile.domain, profile.audience, i),
            direction: getDirection(typeInfo.name, profile.style, profile.domain, profile.audience),
            hotspot: getHotspot(period, i),
            profile
          });
        }

        return items;
      }

      function difficultyPill(difficulty) {
        if (difficulty === "低") return `<span class="pill pill-low">低难度</span>`;
        if (difficulty === "中") return `<span class="pill pill-mid">中难度</span>`;
        return `<span class="pill pill-high">高难度</span>`;
      }

      function renderPlan(plan, period) {
        const { domain, audience, style } = plan[0].profile;
        calendarSummary.textContent = `${domain} | 面向 ${audience} | ${period === "month" ? "1个月" : "1周"}计划 | 风格：${style}`;
        calendarGrid.className = `calendar-grid ${period}`;

        calendarGrid.innerHTML = plan
          .map(
            (item) => `
              <article class="day-card" data-difficulty="${item.difficulty}">
                <div class="day-top">
                  <div>
                    <div class="day-number">Day ${item.dayNumber}</div>
                    <div class="day-date">${item.label}</div>
                  </div>
                  ${difficultyPill(item.difficulty)}
                </div>

                <div class="meta-row">
                  <span class="type-chip">${item.emoji} ${item.type}</span>
                  <span class="tag-chip">已关联热点</span>
                </div>

                <div class="section">
                  <div class="section-title">发布主题</div>
                  <p>${item.title}</p>
                </div>

                <div class="section">
                  <div class="section-title">内容方向</div>
                  <p>${item.direction}</p>
                </div>

                <div class="hotspot-box">
                  <div class="section-title">通用热点切入</div>
                  <p>${item.hotspot}</p>
                </div>
              </article>
            `
          )
          .join("");

        applyDifficultyFilter();
      }

      function applyDifficultyFilter() {
        const cards = Array.from(calendarGrid.querySelectorAll(".day-card"));
        cards.forEach((card) => {
          card.classList.remove("dimmed", "highlight");
          if (!activeDifficultyFilter) return;
          if (card.dataset.difficulty === activeDifficultyFilter) {
            card.classList.add("highlight");
          } else {
            card.classList.add("dimmed");
          }
        });

        filterButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.filter === activeDifficultyFilter);
        });
      }

      function clearFilter() {
        activeDifficultyFilter = null;
        applyDifficultyFilter();
      }

      periodButtons.forEach((button) => {
        button.addEventListener("click", () => {
          selectedPeriod = button.dataset.period;
          periodButtons.forEach((item) => item.classList.toggle("active", item === button));
        });
      });

      filterButtons.forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          activeDifficultyFilter = button.dataset.filter;
          applyDifficultyFilter();
        });
      });

      legendBar.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      calendarGrid.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      generateBtn.addEventListener("click", () => {
        const plan = buildPlan(positioningInput.value, selectedPeriod);
        renderPlan(plan, selectedPeriod);
      });

      document.addEventListener("click", (event) => {
        if (!activeDifficultyFilter) return;
        if (event.target.closest(".filter-dot")) return;
        clearFilter();
      });

      positioningInput.value = "AI 工具与效率提升，想用 AI 提升工作流的内容创作者和轻创业者，专业清晰但不过度严肃";
      renderPlan(buildPlan(positioningInput.value, selectedPeriod), selectedPeriod);
    </script>
  </body>
</html>
