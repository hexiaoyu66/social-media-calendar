<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>社交媒体内容日历生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            boxShadow: {
              glass: "0 10px 30px rgba(72, 114, 184, 0.10)"
            },
            colors: {
              ink: "#142033"
            }
          }
        }
      };
    </script>
    <style>
      body {
        background:
          radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 28%),
          linear-gradient(180deg, #f5faff 0%, #eef5ff 52%, #eaf2ff 100%);
      }

      .glass {
        background: rgba(255, 255, 255, 0.62);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.65);
        box-shadow: 0 10px 30px rgba(72, 114, 184, 0.10);
      }

      .calendar-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(1, minmax(0, 1fr));
      }

      @media (min-width: 768px) {
        .calendar-grid.week {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .calendar-grid.month {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (min-width: 1280px) {
        .calendar-grid.week {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .calendar-grid.month {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body class="min-h-screen text-ink antialiased">
    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <section class="glass rounded-[28px] p-6 sm:p-8">
        <div class="flex flex-col gap-6">
          <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
            <div class="max-w-3xl">
              <span class="inline-flex rounded-full border border-white/70 bg-white/60 px-3 py-1 text-xs font-medium text-slate-600">
                Light Tech Calendar Generator
              </span>
              <h1 class="mt-4 text-3xl font-semibold tracking-tight text-slate-900 sm:text-5xl">
                社交媒体内容日历生成器
              </h1>
              <p class="mt-4 max-w-2xl text-sm leading-7 text-slate-600 sm:text-base">
                输入账号定位与周期，自动生成轻量清晰的内容日历，包含发布主题、内容方向、通用热点和执行难度标记。
              </p>
            </div>

            <div class="grid gap-3 sm:grid-cols-3 lg:min-w-[360px]">
              <div class="rounded-2xl border border-white/70 bg-white/55 p-4">
                <div class="text-xs text-slate-500">内容类型</div>
                <div class="mt-2 text-2xl font-semibold" id="statTypes">4</div>
              </div>
              <div class="rounded-2xl border border-white/70 bg-white/55 p-4">
                <div class="text-xs text-slate-500">计划天数</div>
                <div class="mt-2 text-2xl font-semibold" id="statDays">7</div>
              </div>
              <div class="rounded-2xl border border-white/70 bg-white/55 p-4">
                <div class="text-xs text-slate-500">热点关联</div>
                <div class="mt-2 text-2xl font-semibold">Auto</div>
              </div>
            </div>
          </div>

          <form id="calendarForm" class="grid gap-4 xl:grid-cols-[1.1fr_1.1fr_1.1fr_0.9fr_auto_auto]">
            <div>
              <label for="domain" class="mb-2 block text-sm font-medium text-slate-700">账号领域</label>
              <input
                id="domain"
                name="domain"
                type="text"
                placeholder="例如：AI 工具、自媒体运营、精致露营"
                class="w-full rounded-2xl border border-white/70 bg-white/60 px-4 py-3 text-sm outline-none ring-0 placeholder:text-slate-400 focus:border-sky-200 focus:bg-white"
              />
            </div>

            <div>
              <label for="audience" class="mb-2 block text-sm font-medium text-slate-700">目标受众</label>
              <input
                id="audience"
                name="audience"
                type="text"
                placeholder="例如：副业人群、品牌主理人、城市青年"
                class="w-full rounded-2xl border border-white/70 bg-white/60 px-4 py-3 text-sm outline-none placeholder:text-slate-400 focus:border-sky-200 focus:bg-white"
              />
            </div>

            <div>
              <label for="style" class="mb-2 block text-sm font-medium text-slate-700">内容风格</label>
              <input
                id="style"
                name="style"
                type="text"
                placeholder="例如：清晰专业、轻松故事感、温柔审美"
                class="w-full rounded-2xl border border-white/70 bg-white/60 px-4 py-3 text-sm outline-none placeholder:text-slate-400 focus:border-sky-200 focus:bg-white"
              />
            </div>

            <div>
              <label for="period" class="mb-2 block text-sm font-medium text-slate-700">生成周期</label>
              <div class="grid grid-cols-2 gap-2">
                <label class="flex items-center justify-center rounded-2xl border border-white/70 bg-white/60 px-3 py-3 text-sm text-slate-700">
                  <input checked name="period" type="radio" value="week" class="mr-2 accent-sky-600" />
                  1 周
                </label>
                <label class="flex items-center justify-center rounded-2xl border border-white/70 bg-white/60 px-3 py-3 text-sm text-slate-700">
                  <input name="period" type="radio" value="month" class="mr-2 accent-sky-600" />
                  1 月
                </label>
              </div>
            </div>

            <div class="flex items-end">
              <button
                id="fillDemoBtn"
                type="button"
                class="w-full rounded-2xl bg-gradient-to-r from-sky-500 to-blue-600 px-4 py-3 text-sm font-medium text-white transition duration-200 hover:scale-[1.03] hover:shadow-lg"
              >
                示例数据
              </button>
            </div>

            <div class="flex items-end">
              <button
                id="generateBtn"
                type="submit"
                class="w-full rounded-2xl bg-gradient-to-r from-sky-500 via-blue-600 to-indigo-600 px-5 py-3 text-sm font-medium text-white transition duration-200 hover:scale-[1.03] hover:shadow-lg"
              >
                生成内容日历
              </button>
            </div>
          </form>
        </div>
      </section>

      <section class="mt-6">
        <div class="glass rounded-[28px] p-5 sm:p-6">
          <div class="flex flex-col gap-4 border-b border-white/60 pb-5 sm:flex-row sm:items-end sm:justify-between">
            <div>
              <h2 class="text-xl font-semibold text-slate-900">日历视图</h2>
              <p id="calendarSummary" class="mt-1 text-sm text-slate-600">
                先填写顶部信息，再生成一份完整的内容计划。
              </p>
            </div>

            <div class="flex flex-wrap gap-2 text-xs">
              <span class="rounded-full bg-emerald-100 px-3 py-1 font-medium text-emerald-700">低难度</span>
              <span class="rounded-full bg-orange-100 px-3 py-1 font-medium text-orange-700">中难度</span>
              <span class="rounded-full bg-gradient-to-r from-violet-500 to-fuchsia-500 px-3 py-1 font-medium text-white">高难度</span>
            </div>
          </div>

          <div class="mt-5 grid gap-4 sm:grid-cols-4">
            <div class="rounded-2xl border border-white/70 bg-white/55 p-4">
              <div class="text-xs text-slate-500">📘 干货</div>
              <div class="mt-2 text-2xl font-semibold" id="countDry">0</div>
            </div>
            <div class="rounded-2xl border border-white/70 bg-white/55 p-4">
              <div class="text-xs text-slate-500">💬 互动</div>
              <div class="mt-2 text-2xl font-semibold" id="countInteractive">0</div>
            </div>
            <div class="rounded-2xl border border-white/70 bg-white/55 p-4">
              <div class="text-xs text-slate-500">📖 故事</div>
              <div class="mt-2 text-2xl font-semibold" id="countStory">0</div>
            </div>
            <div class="rounded-2xl border border-white/70 bg-white/55 p-4">
              <div class="text-xs text-slate-500">⚡ 热点</div>
              <div class="mt-2 text-2xl font-semibold" id="countTrend">0</div>
            </div>
          </div>

          <div id="calendarGrid" class="calendar-grid week mt-6"></div>
        </div>
      </section>
    </main>

    <script>
      const demoState = {
        domain: "AI 工具与效率提升",
        audience: "想用 AI 提升工作流的内容创作者和轻创业者",
        style: "专业清晰但不过度严肃，强调实操感",
        period: "week"
      };

      const contentTypes = [
        { name: "干货", emoji: "📘" },
        { name: "互动", emoji: "💬" },
        { name: "故事", emoji: "📖" },
        { name: "热点", emoji: "⚡" }
      ];

      const weekdayNames = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];

      const hotspots = {
        week: [
          "周初规划热点：适合用清单、目标拆解或行动建议切入。",
          "周中效率热点：适合分享技巧、模板和避坑经验。",
          "评论征集热点：适合发起问题，沉淀用户真实需求。",
          "案例复盘热点：适合展示结果、经验和转变过程。",
          "周末轻互动热点：适合投票、问答和轻松分享。"
        ],
        month: [
          "月初规划热点：适合目标制定、路线图和计划模板。",
          "月中复盘热点：适合诊断问题、总结阶段成果。",
          "趋势观察热点：适合连接行业变化和用户新需求。",
          "节点借势热点：适合结合换季、假期、节日等场景。",
          "月末总结热点：适合复盘、收获和下月预告。"
        ]
      };

      const difficultyMap = {
        低: "bg-emerald-100 text-emerald-700",
        中: "bg-orange-100 text-orange-700",
        高: "bg-gradient-to-r from-violet-500 to-fuchsia-500 text-white"
      };

      const form = document.getElementById("calendarForm");
      const fillDemoBtn = document.getElementById("fillDemoBtn");
      const calendarGrid = document.getElementById("calendarGrid");
      const calendarSummary = document.getElementById("calendarSummary");

      function getFormState() {
        const data = new FormData(form);
        return {
          domain: (data.get("domain") || "").toString().trim() || "通用内容赛道",
          audience: (data.get("audience") || "").toString().trim() || "泛兴趣用户",
          style: (data.get("style") || "").toString().trim() || "清晰、可信、易执行",
          period: (data.get("period") || "week").toString()
        };
      }

      function fillDemoData() {
        document.getElementById("domain").value = demoState.domain;
        document.getElementById("audience").value = demoState.audience;
        document.getElementById("style").value = demoState.style;
        const radio = form.querySelector(`input[name="period"][value="${demoState.period}"]`);
        if (radio) radio.checked = true;
      }

      function getTotalDays(period) {
        return period === "month" ? 30 : 7;
      }

      function pickDifficulty(type, dayIndex, period) {
        if (type === "互动") return "低";
        if (type === "干货") return dayIndex % 3 === 0 ? "中" : "低";
        if (type === "故事") return "中";
        if (type === "热点") return period === "month" && dayIndex % 5 === 0 ? "高" : "中";
        return "中";
      }

      function getTopicTitle(type, domain, audience, index) {
        const topicMap = {
          干货: [
            `分享一个关于${domain}的入门方法，帮助${audience}快速开始`,
            `拆解一个${domain}常见误区，并给出更稳妥的做法`,
            `制作一份${domain}实操清单，让${audience}立刻能执行`
          ],
          互动: [
            `围绕${domain}发起选择题，了解${audience}最在意的挑战`,
            `做一条评论区征集帖，邀请${audience}说出真实困惑`,
            `设计一个二选一互动，测试${audience}偏好的内容方向`
          ],
          故事: [
            `讲一个与你的${domain}相关的真实经历，建立可信度`,
            `分享一次从混乱到有序的转变过程，强化品牌故事感`,
            `讲述一个用户在${domain}上的进步案例`
          ],
          热点: [
            `把近期常见讨论点映射到${domain}，给${audience}一个实用判断框架`,
            `借势阶段性热点话题，说明${domain}为什么值得现在行动`,
            `结合平台趋势变化，提醒${audience}哪些机会正在出现`
          ]
        };
        const choices = topicMap[type];
        return choices[index % choices.length];
      }

      function getDirection(type, style, domain, audience) {
        const directionMap = {
          干货: `用${style}的表达方式，给出明确步骤、模板或方法，避免空泛结论。`,
          互动: `语气保持${style}，设置低门槛提问，让${audience}更愿意评论、投票或分享经验。`,
          故事: `以${style}的叙事口吻呈现过程、转折与结果，让${domain}内容更有人味。`,
          热点: `用${style}的视角快速解释热点与${domain}的关系，并指出对${audience}的实际价值。`
        };
        return directionMap[type];
      }

      function getHotspot(period, index) {
        const list = hotspots[period];
        return list[index % list.length];
      }

      function buildPlan(state) {
        const totalDays = getTotalDays(state.period);
        const baseDate = new Date();
        const items = [];

        for (let i = 0; i < totalDays; i += 1) {
          const date = new Date(baseDate);
          date.setDate(baseDate.getDate() + i);

          const typeInfo = contentTypes[i % contentTypes.length];
          const difficulty = pickDifficulty(typeInfo.name, i, state.period);

          items.push({
            dayNumber: i + 1,
            label:
              state.period === "month"
                ? `${date.getMonth() + 1} 月 ${date.getDate()} 日`
                : `${weekdayNames[date.getDay()]} · ${date.getMonth() + 1}/${date.getDate()}`,
            type: typeInfo.name,
            emoji: typeInfo.emoji,
            difficulty,
            title: getTopicTitle(typeInfo.name, state.domain, state.audience, i),
            direction: getDirection(typeInfo.name, state.style, state.domain, state.audience),
            hotspot: getHotspot(state.period, i)
          });
        }

        return items;
      }

      function updateStats(plan, period) {
        document.getElementById("statDays").textContent = String(plan.length);
        document.getElementById("statTypes").textContent = "4";
        document.getElementById("countDry").textContent = String(plan.filter((i) => i.type === "干货").length);
        document.getElementById("countInteractive").textContent = String(plan.filter((i) => i.type === "互动").length);
        document.getElementById("countStory").textContent = String(plan.filter((i) => i.type === "故事").length);
        document.getElementById("countTrend").textContent = String(plan.filter((i) => i.type === "热点").length);
        calendarGrid.className = `calendar-grid ${period === "month" ? "month" : "week"} mt-6`;
      }

      function renderPlan(plan, state) {
        updateStats(plan, state.period);
        calendarSummary.textContent = `${state.domain} | 面向 ${state.audience} | ${state.period === "month" ? "1 月" : "1 周"}内容规划 | 风格：${state.style}`;

        calendarGrid.innerHTML = plan.map((item) => `
          <article class="glass rounded-[24px] p-5">
            <div class="flex items-start justify-between gap-4">
              <div>
                <div class="text-xs font-medium uppercase tracking-[0.18em] text-slate-400">Day ${item.dayNumber}</div>
                <h3 class="mt-1 text-lg font-semibold text-slate-900">${item.label}</h3>
              </div>
              <span class="inline-flex rounded-full px-3 py-1 text-xs font-medium ${difficultyMap[item.difficulty]}">
                ${item.difficulty}难度
              </span>
            </div>

            <div class="mt-4 flex flex-wrap gap-2">
              <span class="inline-flex items-center gap-1 rounded-full bg-white/70 px-3 py-1 text-xs font-medium text-slate-700">
                <span>${item.emoji}</span>
                <span>${item.type}</span>
              </span>
              <span class="rounded-full bg-sky-100 px-3 py-1 text-xs font-medium text-sky-700">已关联热点</span>
            </div>

            <div class="mt-5">
              <div class="text-sm font-medium text-slate-900">发布主题</div>
              <p class="mt-2 text-sm leading-7 text-slate-700">${item.title}</p>
            </div>

            <div class="mt-4">
              <div class="text-sm font-medium text-slate-900">内容方向</div>
              <p class="mt-2 text-sm leading-7 text-slate-600">${item.direction}</p>
            </div>

            <div class="mt-4 rounded-2xl border border-white/70 bg-white/50 p-4">
              <div class="text-xs font-medium uppercase tracking-[0.14em] text-slate-500">通用热点切入</div>
              <p class="mt-2 text-sm leading-7 text-slate-700">${item.hotspot}</p>
            </div>
          </article>
        `).join("");
      }

      function generate() {
        const state = getFormState();
        const plan = buildPlan(state);
        renderPlan(plan, state);
      }

      fillDemoBtn.addEventListener("click", () => {
        fillDemoData();
        generate();
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        generate();
      });

      fillDemoData();
      generate();
    </script>
  </body>
</html>
