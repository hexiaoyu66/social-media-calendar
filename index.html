<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设计媒体内容日历生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poiret+One&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #def0f9;
        --text: #142033;
        --muted: #66758c;
        --line: #e4ebf3;
        --title: #4167b1;
        --btn: #9e7f62;
        --btn-deep: #87694f;
        --low: #22c55e;
        --mid: #f59e0b;
        --high-a: #8b5cf6;
        --high-b: #c026d3;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .page {
        width: min(90vw, 1440px);
        margin: 0 auto;
        padding: 34px 0 64px;
      }

      .hero {
        text-align: center;
        margin-bottom: 18px;
      }

      .hero h1 {
        margin: 0;
        font-family: "Poiret One", sans-serif;
        font-size: clamp(2rem, 4vw, 3.8rem);
        font-weight: 800;
        line-height: 1.06;
        letter-spacing: 0.01em;
        color: var(--title);
      }

      .hero p {
        margin: 10px auto 0;
        max-width: 760px;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.8;
      }

      .glass {
        background: rgba(255, 255, 255, 0.68);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.78);
        box-shadow: 0 18px 45px rgba(65, 103, 177, 0.08);
      }

      .top-panel {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 22px;
        border-radius: 30px;
        padding: 24px;
        margin-bottom: 26px;
      }

      .left-panel {
        display: grid;
        gap: 18px;
        align-content: start;
      }

      .field {
        display: grid;
        gap: 10px;
      }

      .label {
        font-size: 0.92rem;
        font-weight: 600;
        color: #334155;
      }

      .prompt {
        width: 100%;
        min-height: 136px;
        resize: vertical;
        border: 1px solid #d7e8f7;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.96);
        padding: 18px;
        color: var(--text);
        outline: none;
        box-shadow: 0 10px 26px rgba(65, 103, 177, 0.06);
        transition: border-color 180ms ease, box-shadow 180ms ease;
      }

      .prompt:focus {
        border-color: #9fc3eb;
        box-shadow: 0 0 0 5px rgba(65, 103, 177, 0.1);
      }

      .period-wrap {
        display: inline-grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        width: 100%;
        max-width: 320px;
      }

      .period-btn {
        border: 1px solid #d7e8f7;
        background: rgba(255, 255, 255, 0.95);
        color: #334155;
        border-radius: 999px;
        padding: 13px 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 180ms ease;
      }

      .period-btn.active {
        background: linear-gradient(135deg, #eff6ff 0%, #f8fbff 100%);
        border-color: #9fc3eb;
        color: #4167b1;
        box-shadow: 0 8px 22px rgba(65, 103, 177, 0.1);
      }

      .generate-btn {
        width: 100%;
        border: 0;
        border-radius: 22px;
        padding: 18px 22px;
        font-size: 1rem;
        font-weight: 800;
        color: #ffffff;
        cursor: pointer;
        background: linear-gradient(135deg, var(--btn) 0%, var(--btn-deep) 100%);
        box-shadow: 0 18px 34px rgba(158, 127, 98, 0.24);
        transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      }

      .generate-btn:hover {
        transform: translateY(-1px) scale(1.015);
        box-shadow: 0 24px 40px rgba(158, 127, 98, 0.28);
        filter: brightness(1.02);
      }

      .right-panel {
        position: relative;
        overflow: hidden;
        border-radius: 28px;
        min-height: 340px;
        background:
          radial-gradient(circle at 84% 22%, rgba(255,255,255,0.75), transparent 22%),
          linear-gradient(180deg, #f7fbff 0%, #eef6ff 100%);
        border: 1px solid rgba(255, 255, 255, 0.82);
      }

      .petals-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .petal {
        position: absolute;
        width: 18px;
        height: 18px;
        opacity: 0.9;
        animation: petalFall linear infinite;
      }

      .petal::before,
      .petal::after {
        content: "";
        position: absolute;
        inset: 0;
        background: #ffd4e5;
        border-radius: 12px 12px 12px 0;
      }

      .petal::before {
        transform: rotate(45deg);
      }

      .petal::after {
        transform: rotate(-45deg);
      }

      .petal-1 { top: -8%; left: 18%; animation-duration: 10s; animation-delay: 0s; }
      .petal-2 { top: -12%; left: 48%; animation-duration: 12s; animation-delay: 2s; }
      .petal-3 { top: -10%; left: 72%; animation-duration: 11s; animation-delay: 4s; }
      .petal-4 { top: -14%; left: 30%; animation-duration: 13s; animation-delay: 1.5s; }
      .petal-5 { top: -9%; left: 84%; animation-duration: 9.5s; animation-delay: 3.2s; }

      @keyframes petalFall {
        0% {
          transform: translate(0, 0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.92;
        }
        100% {
          transform: translate(-70px, 360px) rotate(250deg);
          opacity: 0;
        }
      }

      .cat-wrap {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .cat-stack {
        width: min(82%, 320px);
        display: grid;
        place-items: center;
        gap: 10px;
      }

      .cat-copy {
        font-size: 0.86rem;
        font-weight: 500;
        color: #7c8aa3;
        letter-spacing: 0.06em;
        text-transform: lowercase;
      }

      .cat-svg {
        width: 100%;
        height: auto;
        overflow: visible;
        filter: drop-shadow(0 12px 24px rgba(65, 103, 177, 0.12));
      }

      .calendar-shell {
        border-radius: 30px;
        padding: 24px;
      }

      .calendar-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .calendar-head h2 {
        margin: 0;
        font-size: 1.16rem;
      }

      .calendar-head p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .legend-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .filter-dot {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid transparent;
        background: rgba(255, 255, 255, 0.86);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.82rem;
        font-weight: 700;
        color: #334155;
        cursor: pointer;
        transition: all 160ms ease;
      }

      .filter-dot:hover {
        transform: translateY(-1px);
      }

      .filter-dot.active {
        border-color: #bfdbfe;
        box-shadow: 0 8px 18px rgba(59, 130, 246, 0.12);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex: 0 0 auto;
      }

      .dot-low {
        background: var(--low);
      }

      .dot-mid {
        background: var(--mid);
      }

      .dot-high {
        background: linear-gradient(135deg, var(--high-a) 0%, var(--high-b) 100%);
      }

      .calendar-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(1, minmax(0, 1fr));
      }

      .day-card {
        background: #ffffff;
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 20px;
        box-shadow: 0 10px 26px rgba(15, 23, 42, 0.04);
        transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease, border-color 180ms ease;
      }

      .day-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 32px rgba(15, 23, 42, 0.08);
      }

      .day-card.dimmed {
        opacity: 0.2;
      }

      .day-card.highlight {
        opacity: 1;
        border-color: #c7d2fe;
        box-shadow: 0 18px 40px rgba(79, 70, 229, 0.12);
      }

      .day-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .day-number {
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #94a3b8;
      }

      .day-date {
        margin-top: 6px;
        font-size: 1.05rem;
        font-weight: 700;
        color: #111827;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.78rem;
        font-weight: 800;
        white-space: nowrap;
      }

      .pill-low {
        background: #dcfce7;
        color: #15803d;
      }

      .pill-mid {
        background: #ffedd5;
        color: #c2410c;
      }

      .pill-high {
        background: linear-gradient(135deg, #8b5cf6 0%, #c026d3 100%);
        color: #ffffff;
      }

      .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .type-chip,
      .tag-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .type-chip {
        background: #f8fafc;
        color: #334155;
      }

      .tag-chip {
        background: #eff6ff;
        color: #2563eb;
      }

      .section {
        margin-top: 18px;
      }

      .section-title {
        font-size: 0.9rem;
        font-weight: 700;
        color: #111827;
      }

      .section p {
        margin: 8px 0 0;
        color: #475569;
        font-size: 0.94rem;
        line-height: 1.8;
      }

      .hotspot-box {
        margin-top: 18px;
        padding: 14px;
        border-radius: 18px;
        background: #f8fbff;
        border: 1px solid #e0ecff;
      }

      @media (min-width: 768px) {
        .calendar-grid.week {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .calendar-grid.month {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (min-width: 1200px) {
        .calendar-grid.week {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .calendar-grid.month {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }
      }

      @media (max-width: 980px) {
        .top-panel {
          grid-template-columns: 1fr;
        }

        .right-panel {
          min-height: 320px;
        }

        .cat-stack {
          width: min(70%, 280px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>设计媒体内容日历生成器</h1>
        <p>输入账号定位，选择 1 周或 1 个月周期，自动生成包含主题、方向、热点和执行难度的内容日历。</p>
      </section>

      <section class="top-panel glass">
        <div class="left-panel">
          <div class="field">
            <label class="label" for="positioning">账号定位</label>
            <textarea
              id="positioning"
              class="prompt"
              placeholder="描述您的领域、受众与风格..."
            ></textarea>
          </div>

          <div class="field">
            <div class="label">计划周期</div>
            <div class="period-wrap">
              <button type="button" class="period-btn active" data-period="week">1周</button>
              <button type="button" class="period-btn" data-period="month">1个月</button>
            </div>
          </div>

          <button id="generateBtn" class="generate-btn" type="button">生成日历</button>
        </div>

        <div class="right-panel" id="catPanel">
          <div class="petals-layer">
            <span class="petal petal-1"></span>
            <span class="petal petal-2"></span>
            <span class="petal petal-3"></span>
            <span class="petal petal-4"></span>
            <span class="petal petal-5"></span>
          </div>

          <div class="cat-wrap">
            <div class="cat-stack">
              <svg class="cat-svg" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg" aria-label="line cat">
                <g id="catFloat">
                  <animateTransform
                    attributeName="transform"
                    type="translate"
                    values="0 0; 0 -4; 0 0"
                    dur="3.6s"
                    repeatCount="indefinite"
                  />
                  <path d="M92 110L116 64L136 112" fill="#d7c0a1" stroke="#1f1f1f" stroke-width="4.5" stroke-linejoin="round" />
                  <path d="M208 110L184 64L164 112" fill="#d7c0a1" stroke="#1f1f1f" stroke-width="4.5" stroke-linejoin="round" />
                  <path
                    d="M76 126L98 106L108 118L122 104L132 120L147 106L156 121L171 107L179 121L194 107L204 121L226 112L238 134L227 153L240 169L215 177L205 193L183 189L169 202L150 194L131 202L119 189L97 193L88 178L63 169L74 152Z"
                    fill="#d7c0a1"
                    stroke="#1f1f1f"
                    stroke-width="5"
                    stroke-linejoin="round"
                  />
                  <circle cx="122" cy="146" r="14.5" fill="#ffffff" />
                  <circle cx="180" cy="146" r="14.5" fill="#ffffff" />
                  <g id="leftEye">
                    <circle cx="122" cy="147" r="6.8" fill="#1f1f1f" />
                  </g>
                  <g id="rightEye">
                    <circle cx="180" cy="147" r="6.8" fill="#1f1f1f" />
                  </g>
                  <path d="M151 155C146 153 143 157 143 161C143 164 146 167 151 167C156 167 159 164 159 161C159 157 156 153 151 155Z" fill="#1f1f1f" />
                  <path d="M145 169C147 174 154 174 157 169" stroke="#1f1f1f" stroke-width="3.5" stroke-linecap="round" />
                  <path d="M104 167L73 159" stroke="#1f1f1f" stroke-width="4" stroke-linecap="round" />
                  <path d="M103 177L67 177" stroke="#1f1f1f" stroke-width="4" stroke-linecap="round" />
                  <path d="M103 187L74 194" stroke="#1f1f1f" stroke-width="4" stroke-linecap="round" />
                  <path d="M198 167L229 159" stroke="#1f1f1f" stroke-width="4" stroke-linecap="round" />
                  <path d="M199 177L235 177" stroke="#1f1f1f" stroke-width="4" stroke-linecap="round" />
                  <path d="M199 187L228 194" stroke="#1f1f1f" stroke-width="4" stroke-linecap="round" />
                </g>
              </svg>
              <div class="cat-copy">find something interesting</div>
            </div>
          </div>
        </div>
      </section>

      <section class="calendar-shell glass">
        <div class="calendar-head">
          <div>
            <h2>日历视图</h2>
            <p id="calendarSummary">输入账号定位后点击生成，查看完整内容日历。</p>
          </div>

          <div class="legend-bar" id="legendBar">
            <button class="filter-dot" data-filter="低">
              <span class="dot dot-low"></span>
              <span>低难度</span>
            </button>
            <button class="filter-dot" data-filter="中">
              <span class="dot dot-mid"></span>
              <span>中难度</span>
            </button>
            <button class="filter-dot" data-filter="高">
              <span class="dot dot-high"></span>
              <span>高难度</span>
            </button>
          </div>
        </div>

        <div id="calendarGrid" class="calendar-grid week"></div>
      </section>
    </main>

    <script>
      const positioningInput = document.getElementById("positioning");
      const generateBtn = document.getElementById("generateBtn");
      const periodButtons = Array.from(document.querySelectorAll(".period-btn"));
      const filterButtons = Array.from(document.querySelectorAll(".filter-dot"));
      const calendarGrid = document.getElementById("calendarGrid");
      const calendarSummary = document.getElementById("calendarSummary");
      const legendBar = document.getElementById("legendBar");
      const catPanel = document.getElementById("catPanel");
      const leftEye = document.getElementById("leftEye");
      const rightEye = document.getElementById("rightEye");

      let selectedPeriod = "week";
      let activeDifficultyFilter = null;

      const contentTypes = [
        { name: "干货", emoji: "📘" },
        { name: "互动", emoji: "💬" },
        { name: "故事", emoji: "📖" },
        { name: "热点", emoji: "⚡" }
      ];

      const weekdayNames = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];

      const hotspots = {
        week: [
          "周初规划热点：适合清单、目标拆解和行动建议。",
          "周中效率热点：适合分享方法、模板与避坑经验。",
          "评论征集热点：适合收集受众问题，为后续内容蓄水。",
          "案例复盘热点：适合展示成果、经验和具体变化。",
          "周末轻互动热点：适合投票、问答和轻量分享。"
        ],
        month: [
          "月初规划热点：适合发布目标、路线图和节奏建议。",
          "月中复盘热点：适合问题诊断和阶段成果总结。",
          "趋势观察热点：适合关联行业变化与用户新需求。",
          "节点借势热点：适合结合节日、换季或平台活动。",
          "月末总结热点：适合复盘、收获与下月预告。"
        ]
      };

      function getTotalDays(period) {
        return period === "month" ? 30 : 7;
      }

      function parsePositioning(text) {
        const raw = text.trim();
        if (!raw) {
          return {
            domain: "通用内容赛道",
            audience: "泛兴趣用户",
            style: "清晰、可信、易执行"
          };
        }

        const parts = raw
          .split(/[，。,.\n；;、]/)
          .map((item) => item.trim())
          .filter(Boolean);

        return {
          domain: parts[0] || raw,
          audience: parts[1] || "对该领域感兴趣的目标用户",
          style: parts[2] || "专业清晰、友好克制"
        };
      }

      function pickDifficulty(type, dayIndex, period) {
        if (type === "互动") return "低";
        if (type === "干货") return dayIndex % 3 === 0 ? "中" : "低";
        if (type === "故事") return "中";
        if (type === "热点") return period === "month" && dayIndex % 5 === 0 ? "高" : "中";
        return "中";
      }

      function getTopicTitle(type, domain, audience, index) {
        const topicMap = {
          干货: [
            `分享一个关于${domain}的入门方法，帮助${audience}快速开始`,
            `拆解一个${domain}常见误区，并给出更稳妥的做法`,
            `制作一份${domain}实操清单，让${audience}立刻能执行`
          ],
          互动: [
            `围绕${domain}发起选择题，了解${audience}最在意的挑战`,
            `做一条评论区征集帖，邀请${audience}说出真实困惑`,
            `设计一个二选一互动，测试${audience}偏好的内容方向`
          ],
          故事: [
            `讲一个与你的${domain}相关的真实经历，建立可信度`,
            `分享一次从混乱到有序的转变过程，强化品牌故事感`,
            `讲述一个用户在${domain}上的进步案例`
          ],
          热点: [
            `把近期常见讨论点映射到${domain}，给${audience}一个实用判断框架`,
            `借势阶段性热点话题，说明${domain}为什么值得现在行动`,
            `结合平台趋势变化，提醒${audience}哪些机会正在出现`
          ]
        };

        const choices = topicMap[type];
        return choices[index % choices.length];
      }

      function getDirection(type, style, domain, audience) {
        const directionMap = {
          干货: `用${style}的表达方式，给出明确步骤、模板或方法，避免空泛结论。`,
          互动: `语气保持${style}，设置低门槛提问，让${audience}更愿意评论、投票或分享经验。`,
          故事: `以${style}的叙事方式呈现过程、转折与结果，让${domain}内容更有人味。`,
          热点: `用${style}的视角快速解释热点与${domain}的关系，并指出对${audience}的实际价值。`
        };

        return directionMap[type];
      }

      function getHotspot(period, index) {
        const list = hotspots[period];
        return list[index % list.length];
      }

      function buildPlan(positioning, period) {
        const totalDays = getTotalDays(period);
        const baseDate = new Date();
        const profile = parsePositioning(positioning);
        const items = [];

        for (let i = 0; i < totalDays; i += 1) {
          const date = new Date(baseDate);
          date.setDate(baseDate.getDate() + i);

          const typeInfo = contentTypes[i % contentTypes.length];
          const difficulty = pickDifficulty(typeInfo.name, i, period);

          items.push({
            dayNumber: i + 1,
            label:
              period === "month"
                ? `${date.getMonth() + 1} 月 ${date.getDate()} 日`
                : `${weekdayNames[date.getDay()]} · ${date.getMonth() + 1}/${date.getDate()}`,
            type: typeInfo.name,
            emoji: typeInfo.emoji,
            difficulty,
            title: getTopicTitle(typeInfo.name, profile.domain, profile.audience, i),
            direction: getDirection(typeInfo.name, profile.style, profile.domain, profile.audience),
            hotspot: getHotspot(period, i),
            profile
          });
        }

        return items;
      }

      function difficultyPill(difficulty) {
        if (difficulty === "低") return `<span class="pill pill-low">低难度</span>`;
        if (difficulty === "中") return `<span class="pill pill-mid">中难度</span>`;
        return `<span class="pill pill-high">高难度</span>`;
      }

      function renderPlan(plan, period) {
        const { domain, audience, style } = plan[0].profile;
        calendarSummary.textContent = `${domain} | 面向 ${audience} | ${period === "month" ? "1个月" : "1周"}计划 | 风格：${style}`;
        calendarGrid.className = `calendar-grid ${period}`;

        calendarGrid.innerHTML = plan
          .map(
            (item) => `
              <article class="day-card" data-difficulty="${item.difficulty}">
                <div class="day-top">
                  <div>
                    <div class="day-number">Day ${item.dayNumber}</div>
                    <div class="day-date">${item.label}</div>
                  </div>
                  ${difficultyPill(item.difficulty)}
                </div>

                <div class="meta-row">
                  <span class="type-chip">${item.emoji} ${item.type}</span>
                  <span class="tag-chip">已关联热点</span>
                </div>

                <div class="section">
                  <div class="section-title">发布主题</div>
                  <p>${item.title}</p>
                </div>

                <div class="section">
                  <div class="section-title">内容方向</div>
                  <p>${item.direction}</p>
                </div>

                <div class="hotspot-box">
                  <div class="section-title">通用热点切入</div>
                  <p>${item.hotspot}</p>
                </div>
              </article>
            `
          )
          .join("");

        applyDifficultyFilter();
      }

      function applyDifficultyFilter() {
        const cards = Array.from(calendarGrid.querySelectorAll(".day-card"));
        cards.forEach((card) => {
          card.classList.remove("dimmed", "highlight");
          if (!activeDifficultyFilter) return;
          if (card.dataset.difficulty === activeDifficultyFilter) {
            card.classList.add("highlight");
          } else {
            card.classList.add("dimmed");
          }
        });

        filterButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.filter === activeDifficultyFilter);
        });
      }

      function clearFilter() {
        activeDifficultyFilter = null;
        applyDifficultyFilter();
      }

      function moveEye(group, mouseX, mouseY, centerX, centerY) {
        const dx = mouseX - centerX;
        const dy = mouseY - centerY;
        const angle = Math.atan2(dy, dx);
        const radius = 2.8;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        group.setAttribute("transform", `translate(${x.toFixed(2)} ${y.toFixed(2)})`);
      }

      periodButtons.forEach((button) => {
        button.addEventListener("click", () => {
          selectedPeriod = button.dataset.period;
          periodButtons.forEach((item) => item.classList.toggle("active", item === button));
        });
      });

      filterButtons.forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          activeDifficultyFilter = button.dataset.filter;
          applyDifficultyFilter();
        });
      });

      legendBar.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      calendarGrid.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      catPanel.addEventListener("mousemove", (event) => {
        const rect = catPanel.getBoundingClientRect();
        const mouseX = ((event.clientX - rect.left) / rect.width) * 300;
        const mouseY = ((event.clientY - rect.top) / rect.height) * 280;
        moveEye(leftEye, mouseX, mouseY, 122, 147);
        moveEye(rightEye, mouseX, mouseY, 180, 147);
      });

      catPanel.addEventListener("mouseleave", () => {
        leftEye.setAttribute("transform", "translate(0 0)");
        rightEye.setAttribute("transform", "translate(0 0)");
      });

      generateBtn.addEventListener("click", () => {
        const plan = buildPlan(positioningInput.value, selectedPeriod);
        renderPlan(plan, selectedPeriod);
      });

      document.addEventListener("click", (event) => {
        if (!activeDifficultyFilter) return;
        if (event.target.closest(".filter-dot")) return;
        clearFilter();
      });

      positioningInput.value = "AI 工具与效率提升，想用 AI 提升工作流的内容创作者和轻创业者，专业清晰但不过度严肃";
      renderPlan(buildPlan(positioningInput.value, selectedPeriod), selectedPeriod);
    </script>
  </body>
</html>
